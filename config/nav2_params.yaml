bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 10
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    current_progress_checker: "progress_checker"
    current_goal_checker: "general_goal_checker"
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.08
      movement_time_allowance: 1.8

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.20
      stateful: true

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 56
      model_dt: 0.05
      batch_size: 2048
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.5
      temperature: 0.25
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: false
      reset_period: 1.0
      regenerate_noises: true
      sgf_order: 2
      enforce_path_inversion: true
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      vx_std: 0.65
      vy_std: 0.0
      wz_std: 0.85

      vx_max: 1.90
      vx_min: -1.20
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 2.65
      wz_min: -2.65
      ax_max: 3.5
      ax_min: -3.5
      ay_max: 0.0
      ay_min: 0.0
      az_max: 3.5
      az_min: -3.5

      AckermannConstraints:
        min_turning_r: 0.55

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      critics:
        ["ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        threshold_to_consider: 1.2

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.6
        threshold_to_consider: 2.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.2
        critical_cost: 260.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 1

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.2
        max_path_occupancy_ratio: 0.15
        trajectory_point_step: 2
        threshold_to_consider: 2.0
        offset_from_furthest: 47
        use_path_orientations: true

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        offset_from_furthest: 14
        threshold_to_consider: 2.5

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.3
        offset_from_furthest: 23
        threshold_to_consider: 1.5
        max_angle_to_furthest: 0.80
        forward_preference: false
        mode: 2

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 0.0
        threshold_to_consider: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 20.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[0.392, 0.357], [0.392, -0.357], [-0.392, -0.357], [-0.392, 0.357]]"
      footprint_padding: 0.03
      transform_tolerance: 1.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 8.0
          raytrace_min_range: 0.15
          obstacle_max_range: 7.0
          obstacle_min_range: 0.15
          inf_is_valid: false
          observation_persistence: 0.15
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.3
        inflation_radius: 0.65
        always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      footprint: "[[0.392, 0.357], [0.392, -0.357], [-0.392, -0.357], [-0.392, 0.357]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: false
      transform_tolerance: 1.0
      rolling_window: false
      width: 400
      height: 400
      origin_x: -200.0
      origin_y: -200.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_filtered
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 8.0
          raytrace_min_range: 0.15
          obstacle_max_range: 7.0
          obstacle_min_range: 0.15
          inf_is_valid: false
          observation_persistence: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.8
        inflation_radius: 0.80
        always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.50
      allow_unknown: true
      max_iterations: 500000
      max_on_approach_iterations: 400
      max_planning_time: 3.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 6.0
      analytic_expansion_max_cost: 120.0
      analytic_expansion_max_cost_override: true
      minimum_turning_radius: 2.00
      reverse_penalty: 1.5
      change_penalty: 0.0
      non_straight_penalty: 1.05
      cost_penalty: 2.0
      retrospective_penalty: 0.02
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      smooth_path: true
      allow_primitive_interpolation: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.5

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.90, 0.0, 2.65]
    min_velocity: [-1.20, 0.0, -2.65]
    max_accel: [3.5, 0.0, 3.5]
    max_decel: [-3.5, 0.0, -3.5]
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0